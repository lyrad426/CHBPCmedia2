<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Green Page</title>

  <style>

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #f4f1eb;
    font-family: Inter, system-ui, sans-serif;
  }

  .table-container {
    width: max(100%);
    padding: 24px;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 8px;
    background: #3b2416; /* dark brown */
    padding: 12px;
    border-radius: 20px;
    box-shadow:
      0 12px 30px rgba(0, 0, 0, 0.18);
  }

  td {
    background: rgba(255, 255, 255, 0.08);
    color: #f7f3ee;
    text-align: center;
    padding: 24px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  td:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

    :root {
      --forest-green: #0f3d1f;
      --card-bg: rgba(255, 255, 255, 0.08);
      --text: #f5f7f5;
      --accent: #7dd87d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(
        135deg,
        #0f3d1f 0%,
        #14532d 50%,
        #1b5e20 100%
      );
      color: var(--text);
    }

    .card {
      width: max(90%);
      padding: 3rem;
      border-radius: 24px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.25);
    }

    .button {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.9rem 1.5rem;
      border-radius: 999px;
      background: var(--accent);
      color: #0f3d1f;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>"The Defender" Newsletter</h1>
    <h3>from In Defense Of Truth<br>a Cub Hill Bible Church Radio Ministry</h3>
